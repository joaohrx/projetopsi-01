{% extends 'base.html'%}

{% block title %}
Área de livros
{% endblock %}

{% block estilo %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/cadastro.css') }}">
{% endblock %}

{% block content %}


   <a href="javascript:history.back()" class="voltar"> ← Voltar </a>

    <button id="theme-toggle" class="TROCA_DE_TEMA">Modo Claro</button>

    <div class="main-container">
        <div class="Caixa_de_login">
            <h1 class="Titulo">{Livraria Marginália}</h1>
            <p class="subtitulo">Junte-se à nossa comunidade literária</p>

            <div class="formulario">

                <form action="{{ url_for('cadastro') }}" method="POST" class="form">

                    <div class="input">
                        <input name="nome" class="inputs" type="text" placeholder="Nome completo:" required />
                    </div>

                    <div class="input">
                        <input name="email" class="inputs" type="email" placeholder="Email:" required />
                    </div>

                    <div class="input">
                        <input name="senha" class="inputs" type="password" placeholder="Senha:" required />
                    </div>

                    <div class="input">
                        <input name="telefone" class="inputs" type="tel" placeholder="Telefone:" />
                    </div>

                    <div class="input">
                        <input name="endereco" class="inputs" type="text" placeholder="Endereço completo:" />
                    </div>

                    <div class="input">
                        <input name="data_de_nascimento" class="inputs" type="text"
                        onfocus="(this.type='date')" onblur="(this.type='text')"
                        placeholder="Data de nascimento:" />
                    </div>

                    <button type="submit" class="Botão_de_login">Cadastrar</button>

                </form>

                <p class="login">
                    Já tem uma conta?
                    <a href="{{ url_for('login') }}">Faça login</a>
                </p>

            </div>
        </div>

        <div class="image-container">
            <div class="imagem1">
                <img class="img1" src="{{ url_for('static', filename='livraria.jpg') }}" alt="" />
            </div>

            <div class="imagem2">
                <img class="img2" src="{{ url_for('static', filename='livros.jpg') }}" alt="" />
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script_cadastro.js') }}"></script>
        
{% endblock %}
