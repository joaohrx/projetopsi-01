{% extends 'base.html'%}

{% block title %}
Área de livros
{% endblock %}

{% block estilo %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/stylecadastro.css') }}">
{% endblock %}

{% block content %}

<a href="javascript:history.back()" class="voltar"> ← Voltar </a>

<div class="main-container">

    <div class="Caixa_de_login">
        <h1 class="Titulo">{Livraria Marginália}</h1>
        <p class="subtitulo">Junte-se à nossa comunidade literária</p>

        <div class="formulario">

            <form action="{{ url_for('cadastro') }}" method="POST" class="form">

                <input name="nome" class="inputs" type="text" placeholder="Nome completo:" required />
                <input name="email" class="inputs" type="email" placeholder="Email:" required />
                <input name="senha" class="inputs" type="password" placeholder="Senha:" required />

                <button type="submit" class="Botão_de_login">Cadastrar</button>

            </form>

            <p class="login">
                Já tem uma conta?
                <a href="{{ url_for('login') }}">Faça login</a>
            </p>

        </div>
    </div>

    
    <div class="image-container">
        <div class="imagem1">
            <img class="img1" src="{{ url_for('static', filename='img/livraria.jpg') }}">
        </div>

        <div class="imagem2">
            <img class="img2" src="{{ url_for('static', filename='img/livros.jpg') }}">
        </div>
    </div>

</div>

{% endblock %}
